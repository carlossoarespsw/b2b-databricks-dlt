# Heavy Tables Configuration
# Tables with 15M+ rows requiring specialized ingestion outside DLT

source_catalog: "dev_vcn_b2b_federated"  # Update per environment

heavy_tables:
  - name: vcn_request
    schema: public
    pk: vcn_request_id
    watermark: last_modified
    watermark_days: 180  # Initial load: last 6 months
    description: "VCN request main table - 15M+ rows from 2017"
    
  - name: vcn_request_financial_trans
    schema: public
    pk: vcn_request_financial_trans_id
    watermark: last_modified
    watermark_days: 180  # Initial load: last 6 months
    description: "VCN request financial transactions - 15M+ rows from 2017"

# Target structure (writes directly to Bronze):
# {environment}_vcn_public.bronze.vcn_request
# {environment}_vcn_public.bronze.vcn_request_financial_trans
#
# DLT Silver/Gold pipelines read from these bronze tables like any other table
